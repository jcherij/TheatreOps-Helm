# Database credentials — values injected at deploy time via helm --set or external secrets operator
# Do not commit actual credential values; use a secrets management pipeline.
apiVersion: v1
kind: Secret
metadata:
  name: mediqueue-db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
type: Opaque
data:
  # base64-encoded values supplied at deploy time — placeholders here
  postgres-password: {{ "change-me-postgres-admin" | b64enc | quote }}
  app-password: {{ "change-me-app-password" | b64enc | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: mediqueue-redis-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ "change-me-redis-password" | b64enc | quote }}

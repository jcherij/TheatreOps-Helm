# API service — ClusterIP only; exposed externally via Ingress only
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mediqueue.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "mediqueue.apiSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

---
# Worker service — headless; no external or internal load balancing needed
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mediqueue.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "mediqueue.workerSelectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

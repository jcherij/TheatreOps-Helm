# API service account — used by the scheduling API pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mediqueue.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
automountServiceAccountToken: false

---
# Worker service account — used by the queue processing worker pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mediqueue.workerServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
automountServiceAccountToken: false

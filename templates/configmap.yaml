apiVersion: v1
kind: ConfigMap
metadata:
  name: mediqueue-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  SCHEDULE_HORIZON_DAYS: {{ .Values.config.scheduleHorizonDays | quote }}
  QUEUE_REFRESH_SECONDS: {{ .Values.config.queueRefreshSeconds | quote }}
  NOTIFICATIONS_INTERNAL: {{ .Values.config.notificationsInternal | quote }}
  DB_HOST: {{ include "mediqueue.postgresHost" . | quote }}
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgresql.auth.database | quote }}
  DB_USER: {{ .Values.postgresql.auth.username | quote }}
  REDIS_HOST: {{ include "mediqueue.redisHost" . | quote }}
  REDIS_PORT: "6379"
  ENVIRONMENT: {{ .Values.global.environment | quote }}

---
# DB init SQL loaded by the postgresql initdbScripts — creates schema and indexes
apiVersion: v1
kind: ConfigMap
metadata:
  name: mediqueue-init-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediqueue.labels" . | nindent 4 }}
data:
  01-schema.sql: |
    CREATE TABLE IF NOT EXISTS operating_rooms (
      id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      room_number VARCHAR(10) NOT NULL UNIQUE,
      department  VARCHAR(100) NOT NULL,
      status      VARCHAR(20) NOT NULL DEFAULT 'available',
      updated_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS surgical_cases (
      id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      patient_id      VARCHAR(64) NOT NULL,
      room_id         UUID REFERENCES operating_rooms(id),
      procedure_code  VARCHAR(20) NOT NULL,
      scheduled_start TIMESTAMPTZ NOT NULL,
      estimated_duration_min INT NOT NULL,
      surgeon_id      VARCHAR(64) NOT NULL,
      status          VARCHAR(20) NOT NULL DEFAULT 'scheduled',
      created_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
      updated_at      TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_cases_room_date
      ON surgical_cases(room_id, scheduled_start);

    CREATE INDEX idx_cases_status
      ON surgical_cases(status);
